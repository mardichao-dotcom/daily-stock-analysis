<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法說會提醒與 AI 總結 — 即將推出</title>
<link rel="icon" href="favicon.ico">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #21262d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --accent:  #58a6ff;
  }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
    font-size: 15px; line-height: 1.6; display: flex; align-items: center;
    justify-content: center; }
  .container { max-width: 520px; width: 100%; padding: 48px 24px;
    text-align: center; }
  .back { display: inline-block; font-size: 12px; color: var(--muted);
    text-decoration: none; margin-bottom: 52px; }
  .back:hover { color: var(--accent); }
  .icon { font-size: 48px; margin-bottom: 24px; }
  h1 { font-size: clamp(20px, 4vw, 28px); font-weight: 700;
    color: var(--text); margin-bottom: 12px; letter-spacing: -.3px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 700;
    letter-spacing: .8px; text-transform: uppercase; padding: 3px 10px;
    border-radius: 20px; background: rgba(139,148,158,.15);
    color: var(--muted); border: 1px solid rgba(139,148,158,.3);
    margin-bottom: 28px; }
  .desc { font-size: 14px; color: var(--muted); line-height: 1.8;
    max-width: 380px; margin: 0 auto; }
  .divider { width: 40px; height: 1px; background: var(--border);
    margin: 32px auto; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← 回首頁</a>
  <div class="icon">🔔</div>
  <h1>法說會提醒與 AI 總結</h1>
  <div class="badge">Coming Soon</div>
  <p class="desc">此功能開發中，即將推出。<br>系統將自動追蹤成員股法說會時程，於前一天發出提醒，並在法說會後提供 AI 重點摘要。</p>
  <div class="divider"></div>
  <a class="back" href="index.html">← 回首頁</a>
</div>
</body>
</html>
